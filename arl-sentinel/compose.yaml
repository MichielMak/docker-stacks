services:
  arl-sentinel:
    image: python:3.13-slim@sha256:f82c96458eedc847b233e582eb31336f4954b39cae020b6dcf5b3ed0e5cbcd74
    container_name: arl-sentinel
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python sentinel.py"
    environment:
      - TZ=Europe/Amsterdam
      - CHECK_INTERVAL_SECONDS=21600
      - GOTIFY_URL=http://gotify
      - GOTIFY_TOKEN=${ARL_SENTINEL_GOTIFY_TOKEN}
      - DOCKERPROXY_URL=http://arl-dockerproxy:2375
      - ATTEMPT_AUTO_LOGIN=true
      - DEEZER_EMAIL=${DEEZER_EMAIL}
      - DEEZER_PASSWORD=${DEEZER_PASSWORD}
    volumes:
      - ${ARL_SENTINEL_DATA_DIR:-/mnt/ssd0/michiel/arl-sentinel}/app:/app
      - ${ARL_SENTINEL_DATA_DIR:-/mnt/ssd0/michiel/arl-sentinel}/data:/data
      - ${ARL_SENTINEL_DATA_DIR:-/mnt/ssd0/michiel/arl-sentinel}/inbox:/inbox
      - ${DOCKER_DATA_DIR}/deemix/config:/targets/deemix
      - ${DOCKER_DATA_DIR}/spotizerr/data/creds:/targets/spotizerr
    restart: unless-stopped
    depends_on:
      - arl-dockerproxy
    networks:
      - npm

  arl-dockerproxy:
    image: linuxserver/socket-proxy:3.2.19@sha256:de8215f99a9ce4bbff5d8853d7a5ae4bbe6baa0ed868046a0251320a4fb05aa2
    container_name: arl-dockerproxy
    environment:
      - CONTAINERS=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - npm
    read_only: true
    tmpfs:
      - /run

networks:
  npm:
    external: true
