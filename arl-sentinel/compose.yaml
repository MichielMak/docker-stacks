services:
  arl-sentinel:
    image: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
    container_name: arl-sentinel
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python sentinel.py"
    environment:
      - TZ=Europe/Amsterdam
      - CHECK_INTERVAL_SECONDS=21600
      - GOTIFY_URL=http://gotify
      - GOTIFY_TOKEN=${ARL_SENTINEL_GOTIFY_TOKEN}
      - DOCKERPROXY_URL=http://arl-dockerproxy:2375
      - ATTEMPT_AUTO_LOGIN=true
      - DEEZER_EMAIL=${DEEZER_EMAIL}
      - DEEZER_PASSWORD=${DEEZER_PASSWORD}
    volumes:
      - ${DOCKER_DATA_DIR}/arl-sentinel/app:/app
      - ${DOCKER_DATA_DIR}/arl-sentinel/data:/data
      - ${DOCKER_DATA_DIR}/arl-sentinel/inbox:/inbox
      - ${DOCKER_DATA_DIR}/deemix/config:/targets/deemix
      - ${DOCKER_DATA_DIR}/spotizerr/data/creds:/targets/spotizerr
    restart: unless-stopped
    depends_on:
      - arl-dockerproxy
    networks:
      - npm

  arl-web:
    image: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
    container_name: arl-web
    working_dir: /app
    command: sh -c "pip install --no-cache-dir requests && python webapp.py"
    environment:
      - TZ=Europe/Amsterdam
      - WEB_PORT=8080
    volumes:
      - ${DOCKER_DATA_DIR}/arl-sentinel/app:/app:ro
      - ${DOCKER_DATA_DIR}/arl-sentinel/data:/data:ro
    restart: unless-stopped
    depends_on:
      - arl-sentinel
    networks:
      - npm
    labels:
      - homepage.group=Media
      - homepage.name=ARL
      - homepage.icon=deezer.png
      - homepage.href=https://arl.${DOMAIN}/
      - homepage.description=Current Deezer ARL token
      - traefik.enable=true
      - traefik.http.routers.arl.rule=Host(`arl.${DOMAIN}`)
      - traefik.http.routers.arl.entrypoints=websecure
      - traefik.http.routers.arl.tls=true
      - traefik.http.services.arl.loadbalancer.server.port=8080

  arl-dockerproxy:
    image: linuxserver/socket-proxy:3.4.2@sha256:a9de14c1c9697de5384a63c2a8e1fdbb823d74f03c94cde77c59e149169c0326
    container_name: arl-dockerproxy
    environment:
      - CONTAINERS=1
      - POST=0
      - ALLOW_RESTARTS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - npm
    read_only: true
    tmpfs:
      - /run

networks:
  npm:
    external: true
