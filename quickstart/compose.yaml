services:
  quickstart:
    image: kometateam/quickstart:v0.10.1@sha256:510d3e28f1024cf3674137fb3ebe3293507c7f5b1979a6145b4248b58a0e5a93
    container_name: quickstart
#    ports:
#      - 7171:7171
    environment:
      - TZ=Europe/Amsterdam
    volumes:
      - ${DOCKER_DATA_DIR}/quickstart/config:/config
    restart: unless-stopped
