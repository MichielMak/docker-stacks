services:
  grimmory:
    image: grimmory/grimmory:v2.3.0@sha256:9014247f591074529894f81115ca40f899db697e89f72c2fe91ec530e3f19597
    container_name: grimmory
    environment:
      - USER_ID=${PUID}
      - GROUP_ID=${PGID}
      - TZ=Europe/Amsterdam
      - DATABASE_URL=jdbc:mariadb://grimmorymariadb:3306/booklore
      - DATABASE_USERNAME=booklore
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - REMOTE_AUTH_ENABLED=true
      - REMOTE_AUTH_CREATE_NEW_USERS=true
      - REMOTE_AUTH_HEADER_NAME=Remote-Name
      - REMOTE_AUTH_HEADER_USER=Remote-User
      - REMOTE_AUTH_HEADER_EMAIL=Remote-Email
      - REMOTE_AUTH_HEADER_GROUPS=Remote-Groups
      - REMOTE_AUTH_ADMIN_GROUP=admin
    depends_on:
      grimmorymariadb:
        condition: service_healthy
    volumes:
      - ${DOCKER_DATA_DIR}/booklore/config:/app/data
      - ${MEDIA_DIR}/books:/books
      - ${MEDIA_DIR}/downloads/usenet/books:/bookdrop
    restart: unless-stopped
    networks:
      - npm
    labels:
      - homepage.group=Media
      - homepage.name=Grimmory
      - homepage.icon=sh-booklore.png
      - homepage.href=http://grimmory.${DOMAIN}/
      - homepage.description=Personal digital library for ebooks and audiobooks
      # Main router for grimmory.${DOMAIN}
      - traefik.enable=true
      - traefik.docker.network=npm
      - traefik.http.routers.grimmory.rule=Host(`grimmory.${DOMAIN}`)
      - traefik.http.routers.grimmory.entrypoints=websecure
      - traefik.http.routers.grimmory.tls=true
      - traefik.http.services.grimmory.loadbalancer.server.port=6060
      # Test router for books.${DOMAIN} with guest auto-login
      - traefik.http.routers.grimmory-test.rule=Host(`books.${DOMAIN}`)
      - traefik.http.routers.grimmory-test.entrypoints=websecure
      - traefik.http.routers.grimmory-test.tls=true
      - traefik.http.routers.grimmory-test.service=grimmory
      - traefik.http.routers.grimmory-test.middlewares=grimmory-guest-auth
      # Guest auth middleware using headers
      - traefik.http.middlewares.grimmory-guest-auth.headers.customrequestheaders.Remote-User=guest
      - traefik.http.middlewares.grimmory-guest-auth.headers.customrequestheaders.Remote-Name=Guest User
      - traefik.http.middlewares.grimmory-guest-auth.headers.customrequestheaders.Remote-Email=guest@${DOMAIN}
      - traefik.http.middlewares.grimmory-guest-auth.headers.customrequestheaders.Remote-Groups=
  grimmorymariadb:
    image: linuxserver/mariadb:11.4.9@sha256:8dc302ed6e5933ded61a46b7f559749073632be361942b2a6ca0793c23baa2d0
    container_name: grimmorymariadb
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Amsterdam
      - MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=booklore
      - MYSQL_USER=booklore
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ${DOCKER_DATA_DIR}/bookloremariadb/config:/config
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - mariadb-admin
        - ping
        - -h
        - localhost
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - npm
networks:
  npm:
    external: true
