services:
  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector agent: scrapes Docker container stats, host metrics
  # and container logs, and forwards them to the SigNoz ingester (OTLP gRPC).
  # View the data in SigNoz under Infra Monitoring -> Containers / Hosts.
  # ---------------------------------------------------------------------------
  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.155.0@sha256:4935caa35e9a4cb387e35732e8fb22b2b5759af8d12e7043357f03837f6e8df5
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    user: "0:0"
    environment:
      - TZ=${TZ}
      # Credentials/identifiers for Prometheus scrape targets, referenced in
      # config.yaml as ${env:VAR}. Komodo injects these from the env files.
      - UPTIME_KUMA_METRICS_USER=${UPTIME_KUMA_METRICS_USER}
      - UPTIME_KUMA_METRICS_PASSWORD=${UPTIME_KUMA_METRICS_PASSWORD}
      - HEALTHCHECKS_PROJECT_UUID=${HEALTHCHECKS_PROJECT_UUID}
      - HEALTHCHECKS_METRICS_KEY=${HEALTHCHECKS_METRICS_KEY}
      - SLSKD_METRICS_USERNAME=${SLSKD_METRICS_USERNAME}
      - SLSKD_METRICS_PASSWORD=${SLSKD_METRICS_PASSWORD}
    volumes:
      - ./config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/.ix-apps/docker/containers:/var/lib/docker/containers:ro
      - /:/hostfs:ro
    networks:
      - npm

networks:
  npm:
    external: true
