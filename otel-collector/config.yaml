# OpenTelemetry Collector (agent) — scrapes the Docker host and ships
# container metrics, host metrics and container logs to the SigNoz ingester.
extensions:
  # Watches the Docker daemon for container start/stop events. Used by
  # receiver_creator below to spin up one filelog receiver per container with
  # the correct container.name / service.name already attached to each record.
  docker_observer:
    endpoint: unix:///var/run/docker.sock

receivers:
  # Per-container CPU / memory / network / disk stats via the Docker API.
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    timeout: 20s
    api_version: "1.44"
    metrics:
      container.cpu.utilization:
        enabled: true
      container.memory.percent:
        enabled: true
      container.memory.usage.limit:
        enabled: true
      container.memory.usage.total:
        enabled: true
      container.network.io.usage.rx_bytes:
        enabled: true
      container.network.io.usage.tx_bytes:
        enabled: true
      container.network.io.usage.rx_dropped:
        enabled: true
      container.network.io.usage.tx_dropped:
        enabled: true
      container.blockio.io_service_bytes_recursive:
        enabled: true
      container.blockio.io_serviced_recursive:
        enabled: true

  # Host-level metrics (CPU, memory, disk, filesystem, network).
  hostmetrics:
    collection_interval: 30s
    root_path: /hostfs
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      network: {}
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/*
            - /var/lib/docker/*
            - /snap/*
            - /boot/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - cgroup
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - mqueue
            - overlay
            - proc
            - procfs
            - pstore
            - squashfs
            - sysfs
            - tmpfs
            - tracefs
          match_type: strict

  # Dynamically creates one filelog receiver per running container.
  # docker_observer provides container_name and labels so every log record
  # arrives in SigNoz with service.name = the container name and
  # container.name set, instead of a raw container ID.
  receiver_creator:
    watch_observers: [docker_observer]
    receivers:
      filelog:
        rule: type == "container"
        config:
          include:
            - /var/lib/docker/containers/`container_id`/*-json.log
          start_at: end
          include_file_path: true
          include_file_name: false
          resource:
            container.id: '`container_id`'
            container.name: '`container_name`'
            service.name: '`container_name`'
          operators:
            - type: json_parser
              id: parser-docker
              timestamp:
                parse_from: attributes.time
                layout: "%Y-%m-%dT%H:%M:%S.%LZ"
            - type: move
              from: attributes.log
              to: body
            - type: remove
              field: attributes.time

  # Scrape Prometheus /metrics endpoints exposed by self-hosted apps on the
  # `npm` network. Each job sets a stable job name so the source is easy to
  # find in SigNoz (Metrics Explorer -> filter by `job`).
  prometheus:
    config:
      scrape_configs:
        # Immich API metrics. Requires IMMICH_TELEMETRY_INCLUDE=all on the
        # immich-server container (set by the OTLP/telemetry stack, not here).
        - job_name: immich-api
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["immich-server:8081"]

        # Immich microservices metrics (same container, separate port).
        - job_name: immich-microservices
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["immich-server:8082"]

        # Uptime-Kuma per-monitor metrics. /metrics is protected by basic auth
        # (login credentials or an API key).
        - job_name: uptime-kuma
          scrape_interval: 30s
          metrics_path: /metrics
          basic_auth:
            username: ${env:UPTIME_KUMA_METRICS_USER}
            password: ${env:UPTIME_KUMA_METRICS_PASSWORD}
          static_configs:
            - targets: ["uptime-kuma:3001"]

        # Healthchecks check/tag status metrics. The read-only API key is part
        # of the metrics path (no separate auth header).
        - job_name: healthchecks
          scrape_interval: 30s
          metrics_path: /projects/${env:HEALTHCHECKS_PROJECT_UUID}/metrics/${env:HEALTHCHECKS_METRICS_KEY}
          static_configs:
            - targets: ["healthchecks:8000"]

        # slskd transfer/performance metrics. Endpoint shares the public web
        # port, so basic auth is kept enabled.
        - job_name: slskd
          scrape_interval: 30s
          metrics_path: /metrics
          basic_auth:
            username: ${env:SLSKD_METRICS_USERNAME}
            password: ${env:SLSKD_METRICS_PASSWORD}
          static_configs:
            - targets: ["slskd:5030"]

processors:
  resourcedetection/system:
    detectors:
      - env
      - system
      - docker
    timeout: 2s
    override: false
    system:
      hostname_sources:
        - os
  batch:
    send_batch_size: 10000
    timeout: 10s

exporters:
  otlp:
    endpoint: signoz-ingester:4317
    tls:
      insecure: true

service:
  extensions: [docker_observer]
  pipelines:
    metrics:
      receivers:
        - docker_stats
        - hostmetrics
        - prometheus
      processors:
        - resourcedetection/system
        - batch
      exporters:
        - otlp
    logs:
      receivers:
        - receiver_creator
      processors:
        - resourcedetection/system
        - batch
      exporters:
        - otlp
  telemetry:
    logs:
      encoding: json
