# OpenTelemetry Collector (agent) — scrapes the Docker host and ships
# container metrics, host metrics and container logs to the SigNoz ingester.
receivers:
  # Per-container CPU / memory / network / disk stats via the Docker API.
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    timeout: 20s
    api_version: "1.44"
    metrics:
      container.cpu.utilization:
        enabled: true
      container.memory.percent:
        enabled: true
      container.network.io.usage.rx_bytes:
        enabled: true
      container.network.io.usage.tx_bytes:
        enabled: true
      container.blockio.io_service_bytes_recursive:
        enabled: true

  # Host-level metrics (CPU, memory, disk, filesystem, network).
  hostmetrics:
    collection_interval: 30s
    root_path: /hostfs
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      network: {}
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/*
            - /var/lib/docker/*
            - /snap/*
            - /boot/*
          match_type: regexp
        exclude_fs_types:
          fs_types:
            - autofs
            - binfmt_misc
            - cgroup
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - mqueue
            - overlay
            - proc
            - procfs
            - pstore
            - squashfs
            - sysfs
            - tmpfs
            - tracefs
          match_type: strict

  # Container stdout/stderr logs from the Docker json-file driver.
  filelog/containers:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: json_parser
        id: parser-docker
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - type: regex_parser
        id: extract_container_id
        regex: '^.*containers/(?P<container_id>[^/]+)/.*\.log$'
        parse_from: attributes["log.file.path"]
      - type: move
        from: attributes.container_id
        to: resource["container.id"]
      - type: move
        from: attributes.log
        to: body
      - type: remove
        field: attributes.time

processors:
  resourcedetection/system:
    detectors:
      - env
      - system
    system:
      hostname_sources:
        - os
  batch:
    send_batch_size: 10000
    timeout: 10s

exporters:
  otlp:
    endpoint: signoz-ingester:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers:
        - docker_stats
        - hostmetrics
      processors:
        - resourcedetection/system
        - batch
      exporters:
        - otlp
    logs:
      receivers:
        - filelog/containers
      processors:
        - resourcedetection/system
        - batch
      exporters:
        - otlp
  telemetry:
    logs:
      encoding: json
