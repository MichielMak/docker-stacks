services:
  retrom:
    container_name: retrom
    image: ghcr.io/jmberesford/retrom-service:0.8.2@sha256:81452d830535dd721659909d17b3733b6479981329e099945c42bc00f5e698e6
#    ports:
#      - 5101:5101
    volumes:
      - ${MEDIA_DIR}/retro/roms:/app/library:ro
      - ${DOCKER_DATA_DIR}/retrom/config:/app/config
      - ${DOCKER_DATA_DIR}/retrom/data:/app/data/
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    networks:
      - npm
networks:
  npm:
    external: true