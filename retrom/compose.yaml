services:
  retrom:
    container_name: retrom
    image: ghcr.io/jmberesford/retrom-service:0.8.3@sha256:2eb8dd3ea745f6cec903bee256cbfa4e3cd0b5a4c60bdc7c21642677d96699a6
#    ports:
#      - 5101:5101
    volumes:
      - ${MEDIA_DIR}/retro/roms:/app/library:ro
      - ${DOCKER_DATA_DIR}/retrom/config:/app/config
      - ${DOCKER_DATA_DIR}/retrom/data:/app/data/
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    networks:
      - npm
networks:
  npm:
    external: true