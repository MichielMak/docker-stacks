services:
  shelfmark:
    container_name: shelfmark
    image: ghcr.io/calibrain/shelfmark:v1.3.3@sha256:1f0e9ecdef24a3d8f5787282eaea3859edcd3bb0c3d508382e2b2bc4bb18d7d6
    environment:
      UID: ${UID}
      GID: ${GID}
      FLASK_PORT: 8084
      FLASK_DEBUG: false
      USE_BOOK_TITLE: true
      BOOK_LANGUAGE: nl
      USE_CF_BYPASS: true
    restart: unless-stopped
    volumes:
      - ${MEDIA_DIR}/downloads/usenet/books:/books
      - ${DOCKER_DATA_DIR}/shelfmark/config:/config
    networks:
      - npm
    labels:
      - traefik.enable=true
      - traefik.http.routers.shelfmark.rule=Host(`shelfmark.${DOMAIN}`)
      - traefik.http.routers.shelfmark.entrypoints=websecure
      - traefik.http.routers.shelfmark.tls=true
      - traefik.http.services.shelfmark.loadbalancer.server.port=8084
networks:
  npm:
    external: true
