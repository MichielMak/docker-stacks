services:
  shelfmark:
    container_name: shelfmark
    image: ghcr.io/calibrain/shelfmark:v1.3.4@sha256:056f02e28d446b128d91fa10451c7cc376392f7383bbb841deec49838a419d53
    environment:
      UID: ${UID}
      GID: ${GID}
      FLASK_PORT: 8084
      FLASK_DEBUG: false
      USE_BOOK_TITLE: true
      BOOK_LANGUAGE: nl
      USE_CF_BYPASS: true
    restart: unless-stopped
    volumes:
      - ${MEDIA_DIR}/downloads/usenet/books:/books
      - ${DOCKER_DATA_DIR}/shelfmark/config:/config
    networks:
      - npm
    labels:
      - traefik.enable=true
      - traefik.http.routers.shelfmark.rule=Host(`shelfmark.${DOMAIN}`)
      - traefik.http.routers.shelfmark.entrypoints=websecure
      - traefik.http.routers.shelfmark.tls=true
      - traefik.http.services.shelfmark.loadbalancer.server.port=8084
networks:
  npm:
    external: true
