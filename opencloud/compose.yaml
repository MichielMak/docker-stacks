services:
  opencloud:
    image: opencloudeu/opencloud:4.0.7@sha256:66302ed6e69351e1228ae83c19e3b13aa5cd50f6bc257965bcd694aa62b53376
    container_name: opencloud
    restart: always
    entrypoint:
      - /bin/sh
    command: ['-c', 'opencloud init || true; opencloud server']
    volumes:
      - ${DOCKER_DATA_DIR}/opencloud/config:/etc/opencloud
      - ${DOCKER_DATA_DIR}/opencloud/data:/var/lib/opencloud
    env_file:
      - ./app.env
    expose:
      - 9200
    dns:
      - ${PIHOLE_IP}
      - 1.1.1.1
    networks:
      - npm

  opencloud-collaboration:
    image: opencloudeu/opencloud:4.0.7@sha256:66302ed6e69351e1228ae83c19e3b13aa5cd50f6bc257965bcd694aa62b53376
    container_name: opencloud-collaboration
    restart: always
    depends_on:
      opencloud:
        condition: service_started
      opencloud-collabora:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command: ['-c', 'opencloud collaboration server']
    env_file:
      - ./collaboration.env
    volumes:
      - ${DOCKER_DATA_DIR}/opencloud/config:/etc/opencloud
    expose:
      - 9300
    networks:
      - npm
    dns:
      - ${PIHOLE_IP}
      - 1.1.1.1      

  opencloud-collabora:
    image: collabora/code:26.04.1.4.1@sha256:75859dc9f9084d1877ce36cf96ec86600f495bade33289c9cbc27e0a0ee23b81
    container_name: opencloud-collabora
    restart: always
    entrypoint: ['/bin/bash', '-c']
    command: ['coolconfig generate-proof-key && /start-collabora-online.sh']
    cap_add:
      - MKNOD
    env_file:
      - ./collabora.env
    expose:
      - 9980
    networks:
      - npm
    dns:
      - ${PIHOLE_IP}
      - 1.1.1.1      
    healthcheck:
      test:
        [
          'CMD',
          'bash',
          '-c',
          "exec 3<>/dev/tcp/127.0.0.1/9980 && echo -e 'GET /hosting/discovery HTTP/1.1\r\nHost: localhost:9980\r\n\r\n' >&3 && head -n 1 <&3 | grep '200 OK'",
        ]

networks:
  npm:
    external: true