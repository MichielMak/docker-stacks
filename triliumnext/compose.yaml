services:
  triliumnext:
    image: triliumnext/trilium:v0.102.1@sha256:029ec3f0284b827847d42f9aba924dec5e47856bc015c64880189ce0bc156ac6
    restart: unless-stopped
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
    #    ports:
    #      - "8080:8080"
    volumes:
      - ${DOCKER_DATA_DIR}/triliumnext/config:/home/node/trilium-data
    networks:
      - npm
networks:
  npm:
    external: true