services:
  borg-ui:
    image: ainullcode/borg-ui:2.2.5@sha256:e51b3d2e6cb38d1ba127ef60ba442c1e157965327196e6f7afb69f30c0ba99d1
    container_name: borg-web-ui
    restart: unless-stopped
    #ports:
    #  - "8081:8081"
    volumes:
      - ${DOCKER_DATA_DIR}/borg-ui/data:/data
      - ${DOCKER_DATA_DIR}/borg-ui/cache:/home/borg/.cache/borg
      - ${MEDIA_DIR}/nextcloud:/local:rw
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Amsterdam
      - REDIS_HOST=borg-redis
      - REDIS_PORT=6379
    depends_on:
      borg-redis:
        condition: service_healthy
    labels:
      - homepage.group=Infra
      - homepage.name=Borg UI
      - homepage.icon=sh-borg-ui
      - homepage.href=http://borg.${DOMAIN}/
      - homepage.description=BorgBackup web interface
      - traefik.enable=true
      - traefik.http.routers.borg-ui.rule=Host(`borg.${DOMAIN}`)
      - traefik.http.routers.borg-ui.entrypoints=websecure
      - traefik.http.routers.borg-ui.tls=true
      - traefik.http.services.borg-ui.loadbalancer.server.port=8081
    networks:
      - npm

  borg-redis:
    image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    container_name: borg-redis
    restart: unless-stopped
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - npm

networks:
  npm:
    external: true
