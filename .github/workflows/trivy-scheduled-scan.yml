name: Trivy Scheduled Scan

on:
  schedule:
    # Weekly, Monday 04:15 Europe/Amsterdam (03:15 UTC in summer, 02:15 UTC standard).
    # Using 03:15 UTC keeps it in the early-morning window year-round.
    - cron: "15 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image-scan:
    name: Image scan (all stacks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      ISSUE_TITLE: "🛡️ Trivy scheduled scan — deployed image vulnerabilities"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0

      - name: Extract and scan all images
        id: scan
        run: |
          set -euo pipefail

          # Collect every compose file in the repo.
          mapfile -t compose_files < <(find . \
            \( -name 'compose.yaml' -o -name 'compose.yml' \
               -o -name 'docker-compose.yaml' -o -name 'docker-compose.yml' \) \
            -type f | sort)

          if [ "${#compose_files[@]}" -eq 0 ]; then
            echo "No compose files found. Nothing to scan."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Compose files:"
          printf '%s\n' "${compose_files[@]}"

          # Extract every `image:` reference, strip quotes/whitespace, de-duplicate.
          images=$(grep -hoE '^[[:space:]]*image:[[:space:]]*\S+' "${compose_files[@]}" \
            | sed -E 's/^[[:space:]]*image:[[:space:]]*//; s/["'\'']//g' \
            | tr -d '\r' \
            | sort -u || true)

          if [ -z "$images" ]; then
            echo "No image references found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Images to scan:"
          echo "$images"

          : > summary_report.md
          : > detail_report.md
          : > error_report.md
          fail=0
          scan_error=0
          for img in $images; do
            echo "::group::Scanning $img"
            # --ignore-unfixed: only report vulnerabilities that have a fix
            #   available (actionable — Renovate can bump to the patched image).
            # --exit-code 2: findings return exit code 2, keeping them distinct
            #   from Trivy's exit code 1 which signals a genuine scan error
            #   (e.g. MANIFEST_UNKNOWN for a digest no longer in the registry).
            set +e
            report=$(trivy image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --no-progress \
              --timeout 15m \
              --exit-code 2 \
              --format table \
              "$img" 2>&1)
            code=$?
            set -e

            echo "$report"

            if [ "$code" -eq 0 ]; then
              echo "Clean: $img"
            elif [ "$code" -eq 2 ]; then
              echo "::warning::Vulnerabilities found in $img"

              # Sum HIGH/CRITICAL across all targets in the report so the issue
              # can show a compact per-image count without the full tables.
              high=$(echo "$report" | grep -oE 'HIGH: [0-9]+' \
                | awk -F': ' '{s+=$2} END {print s+0}' || true)
              crit=$(echo "$report" | grep -oE 'CRITICAL: [0-9]+' \
                | awk -F': ' '{s+=$2} END {print s+0}' || true)

              echo "| \`$img\` | $high | $crit |" >> summary_report.md

              {
                echo "### \`$img\`"
                echo
                echo '```'
                echo "$report"
                echo '```'
                echo
              } >> detail_report.md
              fail=1
            else
              echo "::error::Scan failed for $img"

              {
                echo "### \`$img\` (scan error, exit $code)"
                echo
                echo '```'
                echo "$report"
                echo '```'
                echo
              } >> error_report.md
              scan_error=1
            fi
            echo "::endgroup::"
          done

          if [ "$fail" -ne 0 ]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

            {
              echo "$ISSUE_TITLE"
              echo
              echo "The scheduled Trivy scan found **fixable HIGH/CRITICAL** vulnerabilities in images currently referenced on \`main\`. These emerged after merge and are not caught by the PR-triggered scan. Update the affected images (digests) to patched versions."
              echo
              echo "_Last scan: $(date -u '+%Y-%m-%d %H:%M UTC') — [full report in the run logs]($run_url)_"
              echo
              echo "| Image | HIGH | CRITICAL |"
              echo "| --- | ---: | ---: |"
              cat summary_report.md
              echo
              echo "<details><summary>Detailed vulnerability tables</summary>"
              echo
              cat detail_report.md
              echo "</details>"
            } > issue_body.md

            # GitHub caps issue bodies at 65536 chars; the GraphQL updateIssue
            # mutation rejects anything longer. Truncate the detail section so a
            # large scan still produces a valid (updatable) issue — the full
            # tables always remain in the run logs.
            max_bytes=60000
            if [ "$(wc -c < issue_body.md)" -gt "$max_bytes" ]; then
              echo "Issue body over ${max_bytes} bytes; truncating detail section."
              {
                echo "$ISSUE_TITLE"
                echo
                echo "The scheduled Trivy scan found **fixable HIGH/CRITICAL** vulnerabilities in images currently referenced on \`main\`. These emerged after merge and are not caught by the PR-triggered scan. Update the affected images (digests) to patched versions."
                echo
                echo "_Last scan: $(date -u '+%Y-%m-%d %H:%M UTC') — [full report in the run logs]($run_url)_"
                echo
                echo "> ⚠️ Too many findings to embed the full tables here. Only the per-image summary is shown below; see the [run logs]($run_url) for complete details."
                echo
                echo "| Image | HIGH | CRITICAL |"
                echo "| --- | ---: | ---: |"
                cat summary_report.md
              } > issue_body.md
            fi

            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

          # Fail the run only on genuine scan errors. Findings alone keep the
          # run green — they are surfaced via the auto-opened issue.
          if [ "$scan_error" -ne 0 ]; then
            echo "::error::One or more images failed to scan (genuine errors)."
            echo "Scan error details:"
            cat error_report.md
            exit 1
          fi

      - name: Open or update issue
        if: steps.scan.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Ensure the security label exists (idempotent).
          gh label create security \
            --color d73a4a \
            --description "Security vulnerability or advisory" \
            2>/dev/null || true

          existing=$(gh issue list \
            --state open \
            --label security \
            --search "in:title \"$ISSUE_TITLE\"" \
            --json number,title \
            --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
            | head -n1)

          if [ -n "$existing" ]; then
            echo "Updating existing issue #$existing"
            gh issue edit "$existing" --body-file issue_body.md
            gh issue comment "$existing" \
              --body "🔁 Vulnerabilities still present as of $(date -u '+%Y-%m-%d %H:%M UTC'). Issue body updated with the latest scan."
          else
            echo "Creating new issue"
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label security \
              --body-file issue_body.md
          fi

      - name: Close stale issue if clean
        if: steps.scan.outputs.found == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing=$(gh issue list \
            --state open \
            --label security \
            --search "in:title \"$ISSUE_TITLE\"" \
            --json number,title \
            --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
            | head -n1)

          if [ -n "$existing" ]; then
            echo "Closing resolved issue #$existing"
            gh issue close "$existing" \
              --comment "✅ Scheduled Trivy scan on $(date -u '+%Y-%m-%d %H:%M UTC') found no fixable HIGH/CRITICAL vulnerabilities. Closing."
          else
            echo "No open scan issue and no findings. Nothing to do."
          fi
